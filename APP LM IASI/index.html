<!DOCTYPE html>
<html lang="ro">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LM Supra Stoc Iasi</title>
  <link rel="icon" type="image/png" href="./logo.png" />
  <!-- PWA & Home Screen Icons -->
  <link rel="manifest" href="./manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#76BE30">
  <link rel="apple-touch-icon" href="./logo.png">
  <link rel="icon" sizes="192x192" href="./logo.png">
  <link rel="icon" sizes="512x512" href="./logo.png">
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Recharts -->
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js"></script>
  <!-- Barcode Scanner -->
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root, [data-theme='light'] {
      --bg: hsl(140,20%,98%);
      --card: #ffffff;
      --border: hsl(140,15%,88%);
      --primary: hsl(87,64%,38%);
      --primaryFg: #ffffff;
      --primaryLight: hsl(87,64%,92%);
      --primaryDark: hsl(87,64%,28%);
      --secondary: hsl(140,20%,92%);
      --muted: hsl(220,15%,50%);
      --accent: hsl(87,64%,94%);
      --destructive: hsl(0,84%,60%);
      --destructiveLight: hsl(0,84%,94%);
      --foreground: hsl(220,30%,15%);
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
      --shadowMd: 0 4px 24px rgba(0,0,0,0.10);
      --hover-bg: hsl(140, 20%, 97%);
      --scrollbar-thumb: #c8d9c8;
      color-scheme: light;
    }

    [data-theme='dark'] {
      --bg: #111111;
      --card: #1e1e1e;
      --border: #333333;
      --primary: hsl(87,64%,42%);
      --primaryFg: #ffffff;
      --primaryLight: rgba(118, 190, 48, 0.15);
      --primaryDark: hsl(87,64%,32%);
      --secondary: #262626;
      --muted: #9ca3af;
      --accent: #222222;
      --destructive: #ef4444;
      --destructiveLight: rgba(239, 68, 68, 0.15);
      --foreground: #f3f4f6;
      --shadow: 0 4px 15px rgba(0,0,0,0.4);
      --shadowMd: 0 8px 30px rgba(0,0,0,0.6);
      --hover-bg: rgba(255,255,255,0.05);
      --scrollbar-thumb: #444;
      color-scheme: dark;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid, Cell, PieChart, Pie } = window.Recharts;

    const firebaseConfig = {
      apiKey: "AIzaSyB2DTMOXjXwbJ0JTmX05jHIndMMIpHMoAE",
      authDomain: "supra-stoc-lmiasi-c9ad1.firebaseapp.com",
      projectId: "supra-stoc-lmiasi-c9ad1",
      storageBucket: "supra-stoc-lmiasi-c9ad1.firebasestorage.app",
      messagingSenderId: "27826613323",
      appId: "1:27826613323:web:743e5cf69cc3615bcfb1ce"
    };
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    // ─── GOOGLE FONTS ─────────────────────────────────────────────────────────────
    const FontLoader = () => (
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; }
        h1,h2,h3,h4,h5,h6 { font-family: 'Outfit', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 99px; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
        @keyframes slideUp { from { opacity:0; transform:translateY(100%); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
        @keyframes spin    { to   { transform:rotate(360deg); } }
        .fade-up  { animation: fadeUp  .35s ease both; }
        .slide-up { animation: slideUp .32s cubic-bezier(.34,1.56,.64,1) both; }
        .fade-in  { animation: fadeIn  .2s ease both; }
        .slide-up { animation: slideUp .32s cubic-bezier(.34,1.56,.64,1) both; }
        tr:hover td { background: var(--hover-bg); }
        .mobile-only { display: none; }
        .main-content { padding: 32px 36px; }
        @media (max-width: 768px) {
          .mobile-only { display: flex; }
          .pc-only { display: none !important; }
          .main-content { padding: 20px 16px 100px 16px !important; }
          .grid-2 { grid-template-columns: 1fr !important; }
          .stat-card { min-width: 40% !important; padding: 16px !important; }
          .stat-card-val { font-size: 24px !important; }
          .modal-box { width: 94% !important; margin: 0 auto; border-radius: 20px !important; }
          .mobile-stack { flex-direction: column !important; align-items: stretch !important; }
          .mobile-stack > * { width: 100% !important; }
          .page-title { font-size: 22px !important; }
          .table-container { border: 0 !important; border-radius: 0 !important; box-shadow: none !important; margin: 0 -16px; padding: 0 16px; }
        }
      `}</style>
    );

    // ─── THEME ────────────────────────────────────────────────────────────────────
    const T = {
      bg: "var(--bg)",
      card: "var(--card)",
      border: "var(--border)",
      primary: "var(--primary)",
      primaryFg: "var(--primaryFg)",
      primaryLight: "var(--primaryLight)",
      primaryDark: "var(--primaryDark)",
      secondary: "var(--secondary)",
      muted: "var(--muted)",
      accent: "var(--accent)",
      destructive: "var(--destructive)",
      destructiveLight: "var(--destructiveLight)",
      foreground: "var(--foreground)",
      shadow: "var(--shadow)",
      shadowMd: "var(--shadowMd)",
      radius: 14,
    };

    // ─── RAIOANE ───────────────────────────────────────────────────────────
    const RAIOANE = [
      "1-MATERIALE CONSTRUCTII", "2-TAMPLARIE", "3-ELECTRICE", "4-UNELTE",
      "5-ACOPERIRE SOL", "6-GRESIE", "7-SANITARE", "8-INSTALATII",
      "9-GRADINA", "10-FERONERIE", "11-VOPSEA", "12-DECORATIUNI",
      "13-ILUMINAT", "14-ARANJARE SI DEPOZITARE", "15-BUCATARII", "16-SISTEME DE INCALZIRE",
    ];

    // ─── UI PRIMITIVES ────────────────────────────────────────────────────────────
    const Card = ({ children, style = {} }) => (
      <div style={{ background: T.card, borderRadius: T.radius, border: `1px solid ${T.border}`, boxShadow: T.shadow, ...style }}>
        {children}
      </div>
    );

    const Btn = ({ children, onClick, variant = "primary", disabled = false, style = {}, type = "button", full = false }) => {
      const base = {
        display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 7,
        padding: "10px 18px", borderRadius: 12, fontWeight: 600, fontSize: 14,
        cursor: disabled ? "not-allowed" : "pointer", border: "2px solid transparent",
        transition: "all 0.15s", opacity: disabled ? 0.55 : 1, width: full ? "100%" : "auto",
        fontFamily: "'Inter',sans-serif",
      };
      const v = {
        primary: { background: T.primary, color: T.primaryFg, borderColor: T.primary },
        outline: { background: "transparent", color: T.foreground, borderColor: T.border },
        destructive: { background: T.destructive, color: "#fff", borderColor: T.destructive },
        ghost: { background: "transparent", color: T.muted, borderColor: "transparent" },
        success: { background: T.primaryLight, color: T.primaryDark, borderColor: T.primaryLight },
      };
      return (
        <button type={type} disabled={disabled} onClick={onClick}
          style={{ ...base, ...v[variant], ...style }}
          onMouseEnter={e => { if (!disabled && variant === "primary") e.currentTarget.style.background = T.primaryDark; }}
          onMouseLeave={e => { if (!disabled && variant === "primary") e.currentTarget.style.background = T.primary; }}>
          {children}
        </button>
      );
    };

    const Inp = ({ style = {}, label, error, ...props }) => (
      <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
        {label && <div style={{ fontSize: 13, fontWeight: 600, color: T.foreground }}>{label}</div>}
        <input
          style={{
            width: "100%", height: 44, borderRadius: 11, border: `2px solid ${error ? T.destructive : T.border}`,
            padding: "0 14px", fontSize: 14, background: T.card, color: T.foreground, outline: "none",
            fontFamily: "'Inter',sans-serif", transition: "border-color 0.15s", ...style
          }}
          onFocus={e => e.target.style.borderColor = T.primary}
          onBlur={e => e.target.style.borderColor = error ? T.destructive : T.border}
          {...props}
        />
        {error && <div style={{ fontSize: 12, color: T.destructive }}>{error}</div>}
      </div>
    );

    const Sel = ({ children, style = {}, label, error, ...props }) => (
      <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
        {label && <div style={{ fontSize: 13, fontWeight: 600, color: T.foreground }}>{label}</div>}
        <select
          style={{
            width: "100%", height: 44, borderRadius: 11, border: `2px solid ${error ? T.destructive : T.border}`,
            padding: "0 14px", fontSize: 14, background: T.card, color: T.foreground, cursor: "pointer", outline: "none",
            fontFamily: "'Inter',sans-serif", transition: "border-color 0.15s", ...style
          }}
          onFocus={e => e.target.style.borderColor = T.primary}
          onBlur={e => e.target.style.borderColor = error ? T.destructive : T.border}
          {...props}
        >{children}</select>
        {error && <div style={{ fontSize: 12, color: T.destructive }}>{error}</div>}
      </div>
    );

    const Textarea = ({ style = {}, label, ...props }) => (
      <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
        {label && <div style={{ fontSize: 13, fontWeight: 600, color: T.foreground }}>{label}</div>}
        <textarea
          style={{
            width: "100%", borderRadius: 11, border: `2px solid ${T.border}`, padding: "10px 14px",
            fontSize: 14, background: T.card, color: T.foreground, resize: "none", minHeight: 72, outline: "none",
            fontFamily: "'Inter',sans-serif", transition: "border-color 0.15s", ...style
          }}
          onFocus={e => e.target.style.borderColor = T.primary}
          onBlur={e => e.target.style.borderColor = T.border}
          {...props}
        />
      </div>
    );

    const Badge = ({ children, variant = "default", style = {} }) => {
      const v = {
        default: { background: T.secondary, color: T.muted },
        success: { background: T.primaryLight, color: T.primaryDark },
        destructive: { background: T.destructiveLight, color: T.destructive },
        outline: { background: "transparent", color: T.muted, border: `1px solid ${T.border}` },
        gama_A: { background: "#dcfce7", color: "#15803d" },
        gama_B: { background: "#dbeafe", color: "#1d4ed8" },
        gama_S: { background: "#fef9c3", color: "#854d0e" },
        top1: { background: "#dcfce7", color: "#15803d" },
        top2: { background: "#fef9c3", color: "#854d0e" },
      };
      return (
        <span style={{
          display: "inline-flex", alignItems: "center", padding: "3px 10px", borderRadius: 20,
          fontSize: 12, fontWeight: 700, whiteSpace: "nowrap", ...(v[variant] || v.default), ...style
        }}>
          {children}
        </span>
      );
    };

    const Modal = ({ open, onClose, title, children, maxWidth = 520 }) => {
      if (!open) return null;
      return (
        <div style={{ position: "fixed", inset: 0, zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: "20px" }}>
          <div className="fade-in" onClick={onClose}
            style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.45)", backdropFilter: "blur(4px)" }} />
          <div className="fade-up modal-box"
            style={{
              position: "relative", width: "100%", maxWidth, background: T.card,
              borderRadius: "20px", boxShadow: "0 10px 40px rgba(0,0,0,0.2)",
              maxHeight: "90vh", display: "flex", flexDirection: "column"
            }}>
            <div style={{
              padding: "16px 24px", borderBottom: `1px solid ${T.border}`,
              display: "flex", alignItems: "center", justifyContent: "space-between", background: T.secondary + "80", borderRadius: "20px 20px 0 0"
            }}>
              <div style={{ fontFamily: "'Outfit',sans-serif", fontSize: 18, fontWeight: 800, color: T.foreground }}>{title}</div>
              <button onClick={onClose}
                style={{
                  width: 34, height: 34, borderRadius: "50%", border: "none", background: "#f1f5f9",
                  cursor: "pointer", fontSize: 20, color: T.muted, display: "flex", alignItems: "center", justifyContent: "center"
                }}>×</button>
            </div>
            <div style={{ padding: 24, overflowY: "auto", flex: 1 }}>{children}</div>
          </div>
        </div>
      );
    };

    const TH = ({ children, align = "left" }) => (
      <th style={{
        background: T.primary, color: "#fff", padding: "11px 16px", textAlign: align,
        fontWeight: 700, fontSize: 12, letterSpacing: .5, whiteSpace: "nowrap", fontFamily: "'Outfit',sans-serif"
      }}>
        {children}
      </th>
    );
    const TD = ({ children, align = "left", style = {} }) => (
      <td style={{
        padding: "10px 16px", textAlign: align, borderBottom: `1px solid ${T.border}`,
        fontSize: 13, color: T.foreground, whiteSpace: "nowrap", ...style
      }}>
        {children ?? "—"}
      </td>
    );

    const fmt = (n, d = 0) => n == null || isNaN(n) ? "—" : Number(n).toLocaleString("ro-RO", { minimumFractionDigits: d, maximumFractionDigits: d });
    const fmtDate = d => d ? new Date(d).toLocaleDateString("ro-RO") : "—";
    const fmtDateTime = d => d ? new Date(d).toLocaleString("ro-RO", { day: "2-digit", month: "2-digit", year: "2-digit", hour: "2-digit", minute: "2-digit" }) : "—";
    const raionShort = r => r ? (r.split("-").slice(1).join("-") || r) : "";

    // ─── NAV ITEMS ────────────────────────────────────────────────────────────────
    const NAV = [
      { id: "dashboard", label: "Dashboard", icon: "⊞" },
      { id: "suprastoc", label: "Gestiune Suprastoc", icon: "📦" },
    ];

    // ─── SIDEBAR ──────────────────────────────────────────────────────────────────
    function Sidebar({ page, setPage, theme, toggleTheme, user, onLogout }) {
      return (
        <aside style={{
          width: 272, minHeight: "100vh", background: T.card, borderRight: `1px solid ${T.border}`,
          boxShadow: "2px 0 12px rgba(0,0,0,0.05)", display: "flex", flexDirection: "column", flexShrink: 0,
        }}>
          <div style={{ padding: "0", display: "flex", alignItems: "center", justifyContent: "center", borderBottom: `1px solid ${T.border}60`, background: theme === 'dark' ? "#e2e8f0" : "transparent", overflow: "hidden", height: 130 }}>
            <img src="./logo.png" alt="LM Supra Stoc Iasi" style={{ width: "100%", height: "100%", objectFit: "contain", transform: "scale(1.4)", mixBlendMode: theme === 'dark' ? 'normal' : 'multiply' }} />
          </div>
          <nav style={{ flex: 1, padding: "20px 12px", display: "flex", flexDirection: "column", gap: 6 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: T.muted, textTransform: "uppercase", letterSpacing: 1, padding: "0 12px", marginBottom: 8 }}>Meniu Principal</div>
            {NAV.map(n => {
              const active = page === n.id;
              return (
                <button key={n.id} onClick={() => setPage(n.id)}
                  style={{
                    display: "flex", alignItems: "center", gap: 12, padding: "11px 16px", borderRadius: 12, border: "none", cursor: "pointer", textAlign: "left", width: "100%",
                    fontFamily: "'Inter',sans-serif", fontSize: 14, fontWeight: active ? 700 : 500, background: active ? T.primary : "transparent", color: active ? T.primaryFg : T.muted,
                    boxShadow: active ? `0 4px 12px ${T.primary}40` : "none", transition: "all 0.18s"
                  }}>
                  <span style={{ fontSize: 16 }}>{n.icon}</span>{n.label}
                </button>
              );
            })}
          </nav>
          
          <div style={{ padding: "20px", display: "flex", flexDirection: "column", gap: 12, borderTop: `1px solid ${T.border}60` }}>
            {user && (
              <div style={{ display: "flex", alignItems: "center", gap: 10, background: T.secondary, padding: "10px", borderRadius: 12 }}>
                <img src={user.photoURL || "https://ui-avatars.com/api/?name=" + user.displayName} style={{ width: 32, height: 32, borderRadius: "50%" }} />
                <div style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: T.foreground, whiteSpace: "nowrap", textOverflow: "ellipsis", overflow: "hidden" }}>{user.displayName}</span>
                  <span style={{ fontSize: 11, color: T.muted, whiteSpace: "nowrap", textOverflow: "ellipsis", overflow: "hidden" }}>{user.email}</span>
                </div>
              </div>
            )}
            <button onClick={toggleTheme} style={{ width: "100%", display: "flex", alignItems: "center", gap: 10, padding: "12px 14px", borderRadius: 12, background: "transparent", border: `1px solid ${T.border}`, color: T.foreground, cursor: "pointer", fontSize: 14, fontWeight: 600 }}>
              <span style={{ fontSize: 20 }}>{theme === 'dark' ? '☀️' : '🌙'}</span> 
              {theme === 'dark' ? 'Mod Luminos' : 'Mod Întunecat'}
            </button>
            <button onClick={onLogout} style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: 6, padding: "10px", borderRadius: 12, background: "transparent", border: "none", color: T.muted, cursor: "pointer", fontSize: 13, fontWeight: 600 }}>
              🚪 Deconectare
            </button>
          </div>
        </aside>
      );
    }

    // ─── STAT CARD ────────────────────────────────────────────────────────────────
    function StatCard({ label, value, icon, alert = false, delay = 0 }) {
      return (
        <Card className="stat-card" style={{ padding: "22px 24px", flex: 1, minWidth: 160, animation: `fadeUp .35s ease ${delay * 0.08}s both` }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div>
              <div style={{ fontSize: 12, color: T.muted, fontWeight: 600, textTransform: "uppercase", letterSpacing: .8, marginBottom: 8 }}>{label}</div>
              <div className="stat-card-val" style={{ fontFamily: "'Outfit',sans-serif", fontSize: 30, fontWeight: 800, color: alert ? T.destructive : T.foreground }}>{value}</div>
            </div>
            <div style={{ width: 48, height: 48, borderRadius: 14, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, background: alert ? T.destructiveLight : T.primaryLight }}>{icon}</div>
          </div>
        </Card>
      );
    }

    // ─── DASHBOARD PAGE ───────────────────────────────────────────────────────────
    function DashboardPage({ items, raft3p }) {
      const totalItems = items.length;
      const totalQty = items.reduce((s, i) => s + (i.cantitate || 0), 0);
      const lowStock = items.filter(i => (i.cantitate || 0) < 5).length;
      const total3pSd = raft3p.reduce((s, r) => s + (r.sd || 0), 0);
      const cuApro = raft3p.filter(r => r.apro).length;

      const chartData = Object.entries(
        items.reduce((a, i) => { const k = raionShort(i.raion); a[k] = (a[k] || 0) + (i.cantitate || 0); return a; }, {})
      ).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value).slice(0, 8);

      const sdByRaion = [7, 12, 13, 15, 16].map(r => ({ name: `R${r}`, sd: raft3p.filter(p => p.raion === r).reduce((s, p) => s + (p.sd || 0), 0) }));

      const gamaData = [
        { name: "Gamă A", value: raft3p.filter(r => r.gama === "A").length },
        { name: "Gamă B", value: raft3p.filter(r => r.gama === "B").length },
        { name: "Gamă S", value: raft3p.filter(r => r.gama === "S").length },
      ];
      const COLORS = [T.primary, "#3b82f6", "#f59e0b"];

      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
          <div className="fade-up">
            <div className="page-title" style={{ fontFamily: "'Outfit',sans-serif", fontSize: 32, fontWeight: 800, color: T.foreground }}>Dashboard</div>
            <div style={{ fontSize: 14, color: T.muted, marginTop: 4 }}>Privire de ansamblu — Suprastoc</div>
          </div>
          <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
            <StatCard label="Poziții Suprastoc" value={totalItems} icon="📦" delay={0} />
            <StatCard label="Cantitate Totală" value={fmt(totalQty)} icon="📊" delay={1} />
            <StatCard label="Stoc Scăzut (<5)" value={lowStock} icon="⚠️" alert={lowStock > 0} delay={2} />
          </div>
          <div className="grid-2" style={{ display: "grid", gridTemplateColumns: "1fr", gap: 16 }}>
            <Card style={{ padding: 20 }}>
              <div style={{ fontFamily: "'Outfit',sans-serif", fontSize: 16, fontWeight: 700, color: T.foreground, marginBottom: 16 }}>Cantitate Suprastoc pe Raioane</div>
              <ResponsiveContainer width="100%" height={240}>
                <BarChart data={chartData} margin={{ top: 4, right: 8, bottom: 20, left: 0 }}>
                  <CartesianGrid strokeDasharray="3 3" vertical={false} stroke={T.border} />
                  <XAxis dataKey="name" tick={{ fontSize: 11, fill: T.muted }} axisLine={false} tickLine={false} angle={-30} textAnchor="end" />
                  <YAxis tick={{ fontSize: 11, fill: T.muted }} axisLine={false} tickLine={false} />
                  <Tooltip contentStyle={{ borderRadius: 12, border: "none", boxShadow: T.shadowMd, fontSize: 13, background: T.card, color: T.foreground }} cursor={{ fill: T.accent }} />
                  <Bar dataKey="value" name="Cantitate" radius={[6, 6, 0, 0]}>{chartData.map((_, i) => <Cell key={i} fill={T.primary} />)}</Bar>
                </BarChart>
              </ResponsiveContainer>
            </Card>
          </div>
        </div>
      );
    }

    const BarcodeScanner = ({ onScan, onClose }) => {
      const scannerRef = React.useRef(null);
      const [closing, setClosing] = React.useState(false);
      const [errorMsg, setErrorMsg] = React.useState("");

      React.useEffect(() => {
        const html5QrCode = new window.Html5Qrcode("reader");
        scannerRef.current = html5QrCode;
        let unmounted = false;

        window.Html5Qrcode.getCameras().then(devices => {
          if (unmounted) return;
          if (devices && devices.length) {
            let backCamera = devices.find(d => /back|rear|environment/i.test(d.label));
            let cameraId = backCamera ? backCamera.id : devices[devices.length - 1].id;

            html5QrCode.start(
              cameraId,
              { fps: 10, qrbox: { width: 250, height: 150 } },
              (text) => {
                if (closing) return;
                setClosing(true);
                html5QrCode.stop().then(() => onScan(text)).catch(() => onScan(text));
              },
              (err) => { /* ignore */ }
            ).then(() => {
              if (unmounted || closing) html5QrCode.stop().catch(console.error);
            }).catch(err => {
              if (!unmounted) setErrorMsg("Eroare pornire cameră: " + (err?.message || err));
            });
          } else {
            if (!unmounted) setErrorMsg("Nu s-a găsit nicio cameră disponibilă.");
          }
        }).catch(err => {
          if (!unmounted) setErrorMsg("Lipsă permisiuni sau cameră ocupată (" + (err?.message || err) + ")");
        });

        return () => {
          unmounted = true;
          if (scannerRef.current && scannerRef.current.isScanning) {
            scannerRef.current.stop().catch(e => console.error(e));
          }
        };
      }, [onScan, closing]);

      const handleClose = () => {
        if (closing) return;
        setClosing(true);
        if (scannerRef.current && scannerRef.current.isScanning) {
          scannerRef.current.stop().then(onClose).catch(onClose);
        } else {
          onClose();
        }
      };

      return ReactDOM.createPortal(
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 99999, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 20 }}>
          <div style={{ width: "100%", maxWidth: 500, background: T.card, padding: 16, borderRadius: 16, boxShadow: T.shadowMd }}>
            <div style={{ fontFamily: "'Outfit',sans-serif", fontSize: 18, fontWeight: 700, marginBottom: 16, textAlign: "center", color: T.foreground }}>Încadrează Codul de Bare</div>
            {errorMsg ? (
              <div style={{ padding: 20, textAlign: "center", color: T.destructive, fontWeight: 600 }}>{errorMsg}</div>
            ) : (
              <div id="reader" style={{ width: "100%", borderRadius: 12, overflow: "hidden", minHeight: 200, background: "#000" }}></div>
            )}
            <Btn variant="destructive" onClick={handleClose} full style={{ marginTop: 20 }}>{closing ? "Se închide camera..." : "Închide Camera"}</Btn>
          </div>
        </div>,
        document.body
      );
    };

    // ─── ITEM FORM ────────────────────────────────────────────────────────────────
    function ItemForm({ init, items = [], globalCatalog = {}, onClose, onSave }) {
      const [f, setF] = useState({
        denumire: init?.denumire || "",
        codSku: init?.codSku || "",
        ean: init?.ean || "",
        cantitate: init?.cantitate || "",
        raion: init?.raion || "",
        locatie: init?.locatie || "",
        dataIntrare: init?.dataIntrare ? init.dataIntrare.split("T")[0] : new Date().toISOString().split("T")[0],
        observatii: init?.observatii || "",
      });
      const [err, setErr] = useState({});
      const [loading, setLoading] = useState(false);
      const [scanning, setScanning] = useState(null);

      const lookupProduct = (val) => {
        const existingItem = items.find(i => String(i.codSku) === val || String(i.ean) === val);
        if (existingItem) return { denumire: existingItem.denumire, raion: existingItem.raion, codSku: existingItem.codSku, ean: existingItem.ean };
        const cat = globalCatalog[val];
        if (cat) return { denumire: cat.d, raion: cat.r, codSku: cat.sku || val, ean: cat.sku ? val : "" };
        return null;
      };

      const handleScan = (scannedText) => {
        const field = scanning;
        setScanning(null);
        const match = lookupProduct(scannedText);
        if (match) {
          setF(prev => ({ ...prev, [field]: scannedText, codSku: match.codSku || prev.codSku, ean: match.ean || prev.ean, denumire: prev.denumire || match.denumire, raion: prev.raion || match.raion }));
        } else {
          setF(prev => ({ ...prev, [field]: scannedText }));
        }
      };

      const handleCodSkuChange = (e) => {
        const val = e.target.value;
        const match = lookupProduct(val);
        if (match) {
          setF(p => ({ ...p, codSku: val, denumire: p.denumire || match.denumire, raion: p.raion || match.raion, ean: p.ean || match.ean }));
        } else {
          setF(p => ({ ...p, codSku: val }));
        }
      };

      const handleEanChange = (e) => {
        const val = e.target.value;
        const match = lookupProduct(val);
        if (match) {
          setF(p => ({ ...p, ean: val, denumire: p.denumire || match.denumire, raion: p.raion || match.raion, codSku: p.codSku || match.codSku }));
        } else {
          setF(p => ({ ...p, ean: val }));
        }
      };

      const handleDenumireChange = (e) => {
        const val = e.target.value;
        const existingItem = items.find(i => i.denumire.toLowerCase() === val.toLowerCase());
        if (existingItem) {
          setF(p => ({ ...p, denumire: val, codSku: p.codSku || existingItem.codSku, raion: p.raion || existingItem.raion }));
        } else {
          setF(p => ({ ...p, denumire: val }));
        }
      };

      const set = k => e => setF(p => ({ ...p, [k]: e.target.value }));

      const existingLocations = React.useMemo(() => {
        if (!f.codSku && !f.ean) return [];
        const matches = items.filter(i => (f.codSku && String(i.codSku) === String(f.codSku)) || (f.ean && String(i.ean) === String(f.ean)));
        return [...new Set(matches.map(i => i.locatie).filter(Boolean))];
      }, [f.codSku, f.ean, items]);

      const validate = () => {
        const e = {};
        if (f.denumire.length < 3) e.denumire = "Minim 3 caractere";
        if (!f.codSku) e.codSku = "Câmp obligatoriu";
        if (!f.cantitate || Number(f.cantitate) < 1) e.cantitate = "Minim 1";
        if (!f.raion) e.raion = "Selectați raionul";
        if (!f.locatie) e.locatie = "Câmp obligatoriu";
        setErr(e); return !Object.keys(e).length;
      };

      const submit = async () => {
        if (validate()) {
          setLoading(true);
          await onSave({ ...f, cantitate: Number(f.cantitate) });
          setLoading(false);
          onClose();
        }
      };

      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 16, opacity: loading ? 0.6 : 1, pointerEvents: loading ? "none" : "auto" }}>
          {scanning && <BarcodeScanner onScan={handleScan} onClose={() => setScanning(null)} />}
          
          <datalist id="denumiri-list">
            {[...new Set(items.map(i => i.denumire))].filter(Boolean).map((d, idx) => <option key={idx} value={d} />)}
          </datalist>

          <Inp label="Denumire Produs *" value={f.denumire} onChange={handleDenumireChange} error={err.denumire} placeholder="ex: Bormașină Bosch..." list="denumiri-list" />
          
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <div style={{ position: "relative" }}>
              <Inp label="Referință *" value={f.codSku} onChange={handleCodSkuChange} error={err.codSku} placeholder="ex: 12345678" style={{ paddingRight: 44 }} />
              <button onClick={() => setScanning("codSku")} title="Scanează Referința" style={{ position: "absolute", right: 6, bottom: 6, height: 32, width: 36, background: T.primary, color: "#fff", border: "none", borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 16 }}>📷</button>
            </div>
            <Inp label="EAN (opțional)" value={f.ean} onChange={handleEanChange} placeholder="ex: 5948..." />
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <Inp label="Cantitate *" type="number" min={1} value={f.cantitate} onChange={set("cantitate")} error={err.cantitate} placeholder="10" />
            <Sel label="Raion *" value={f.raion} onChange={set("raion")} error={err.raion}>
              <option value="">Selectează raionul...</option>
              {RAIOANE.map(r => <option key={r} value={r}>{r}</option>)}
            </Sel>
          </div>
          
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <Inp label="Locație Suprastoc *" value={f.locatie} onChange={set("locatie")} error={err.locatie} placeholder="ex: R12-Top-A" />
            {existingLocations.length > 0 && (
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                <span style={{ fontSize: 12, color: T.muted, alignSelf: "center", marginRight: 4 }}>Sugestii adrese:</span>
                {existingLocations.map(loc => (
                  <span key={loc} style={{ cursor: "pointer", background: f.locatie === loc ? T.primaryLight : "transparent", color: f.locatie === loc ? T.primaryDark : T.muted, border: `1px solid ${f.locatie === loc ? T.primary : T.border}`, display: "inline-flex", alignItems: "center", padding: "4px 12px", borderRadius: 20, fontSize: 12, fontWeight: 700, transition: "all 0.15s" }} onClick={() => setF(p => ({...p, locatie: loc}))}>{loc}</span>
                ))}
              </div>
            )}
          </div>
          <Textarea label="Observații (opțional)" value={f.observatii} onChange={set("observatii")} placeholder="Detalii adiționale..." />
          <div style={{ display: "flex", gap: 10, paddingTop: 8, borderTop: `1px solid ${T.border}` }}>
            <Btn variant="outline" onClick={onClose} full>Anulează</Btn>
            <Btn onClick={submit} full>{loading ? "Se salvează..." : (init ? "Actualizează" : "Adaugă")}</Btn>
          </div>
        </div>
      );
    }

    // ─── TRANSACTION FORM ─────────────────────────────────────────────────────────
    function TxForm({ item, defaultTip = "intrare", onClose, onSave }) {
      const [tip, setTip] = useState(defaultTip);
      const [cant, setCant] = useState("1");
      const [user, setUser] = useState("");
      const [motiv, setMotiv] = useState("");
      const [err, setErr] = useState({});
      const [loading, setLoading] = useState(false);

      const submit = async () => {
        const e = {};
        if (!cant || Number(cant) < 1) e.cant = "Minim 1";
        if (tip === "iesire" && Number(cant) > item.cantitate) e.cant = `Max ${item.cantitate}`;
        setErr(e); if (Object.keys(e).length) return;

        setLoading(true);
        await onSave({ itemId: item.id, tip, cantitate: Number(cant), utilizator: "", motiv: "" });
        setLoading(false);
        onClose();
      };

      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 16, opacity: loading ? 0.6 : 1, pointerEvents: loading ? "none" : "auto" }}>
          <div>
            <div style={{ fontSize: 13, fontWeight: 600, color: T.foreground, marginBottom: 8 }}>Tip operațiune</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              {[["intrare", "⬇️", "Intrare (+)", "Adaugă pe suprastoc", T.primary, T.primaryLight],
              ["iesire", "⬆️", "Ieșire (-)", "Coboară la raft", T.destructive, T.destructiveLight]].map(([v, ico, lbl, sub, col, bg]) => (
                <button key={v} onClick={() => setTip(v)}
                  style={{
                    display: "flex", flexDirection: "column", alignItems: "center", gap: 4, padding: "14px 10px", borderRadius: 14, cursor: "pointer", transition: "all .15s",
                    border: `2px solid ${tip === v ? col : T.border}`, background: tip === v ? `${col}15` : T.card, color: tip === v ? col : T.muted
                  }}>
                  <div style={{ width: 40, height: 40, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, background: tip === v ? `${col}25` : T.secondary }}>{ico}</div>
                  <span style={{ fontWeight: 700, fontSize: 14 }}>{lbl}</span>
                  <span style={{ fontSize: 11, opacity: .7 }}>{sub}</span>
                </button>
              ))}
            </div>
          </div>
          <div style={{ padding: "10px 14px", borderRadius: 10, fontSize: 13, fontWeight: 500, background: tip === "iesire" ? T.destructiveLight : T.primaryLight, color: tip === "iesire" ? T.destructive : T.primaryDark, border: `1px solid ${tip === "iesire" ? T.destructive + "40" : T.primary + "40"}` }}>
            Stoc curent: <strong>{item.cantitate} bucăți</strong> pe suprastoc
          </div>
          <Inp label="Cantitate *" type="number" min={1} max={tip === "iesire" ? item.cantitate : undefined} value={cant} onChange={e => setCant(e.target.value)} error={err.cant} style={{ textAlign: "center", fontSize: 20, fontWeight: 800, height: 56 }} />
          <div style={{ display: "flex", gap: 10, paddingTop: 8, borderTop: `1px solid ${T.border}` }}>
            <Btn variant="outline" onClick={onClose} full>Anulează</Btn>
            <Btn variant={tip === "iesire" ? "destructive" : "primary"} onClick={submit} full>{loading ? "Se salvează..." : `Confirmă ${tip === "intrare" ? "intrarea" : "ieșirea"}`}</Btn>
          </div>
        </div>
      );
    }

    // ─── SUPRASTOC LIST PAGE ──────────────────────────────────────────────────────
    function SuprastocPage({ items, tx, dispatch, globalCatalog }) {
      const [search, setSearch] = useState("");
      const [raionF, setRaionF] = useState("");
      const [addOpen, setAddOpen] = useState(false);
      const [quickOutOpen, setQuickOutOpen] = useState(false);
      const [quickOutChoices, setQuickOutChoices] = useState(null);
      const [quickScanning, setQuickScanning] = useState(false);
      const [editItem, setEditItem] = useState(null);
      const [detailItem, setDetailItem] = useState(null);
      const [txOpen, setTxOpen] = useState(false);
      const [txTip, setTxTip] = useState("intrare");

      const filtered = useMemo(() => items.filter(i => {
        if (raionF && i.raion !== raionF) return false;
        const q = search.toLowerCase();
        return !q || (i.denumire || "").toLowerCase().includes(q) || (i.codSku || "").toString().toLowerCase().includes(q) || (i.ean || "").toString().toLowerCase().includes(q) || (i.locatie || "").toLowerCase().includes(q);
      }), [items, raionF, search]);

      const openTx = (item, tip) => { setDetailItem(item); setTxTip(tip); setTxOpen(true); };

      const handleQuickOut = (code) => {
        const foundAll = items.filter(i => String(i.codSku) === code || String(i.ean) === code);
        if (foundAll.length === 1) {
          setQuickScanning(false);
          setQuickOutOpen(false);
          openTx(foundAll[0], "iesire");
        } else if (foundAll.length > 1) {
          setQuickScanning(false);
          setQuickOutChoices(foundAll);
        } else {
          alert("Acest produs nu se află momentan pe suprastoc! Verificați codul sau adăugați-l prima dată.");
        }
      };

      const handleDelete = (id) => {
        if (window.confirm("Sigur dorești să ștergi acest produs?")) dispatch({ type: "DELETE_ITEM", id });
      };

      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
          <div className="fade-up" style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 12, flexWrap: "wrap" }}>
            <div>
              <div className="page-title" style={{ fontFamily: "'Outfit',sans-serif", fontSize: 28, fontWeight: 800, color: T.foreground }}>Gestiune Suprastoc</div>
              <div style={{ fontSize: 14, color: T.muted, marginTop: 4 }}>Administrează produsele aflate deasupra rafturilor.</div>
            </div>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
              <Btn onClick={() => setAddOpen(true)}><span style={{ fontSize: 16 }}>＋</span> Adaugă Produs</Btn>
              <Btn variant="destructive" onClick={() => setQuickOutOpen(true)}><span style={{ fontSize: 16 }}>➖</span> Scoate Produs</Btn>
            </div>
          </div>

          <Card className="mobile-stack" style={{ padding: 16, display: "flex", gap: 12, flexWrap: "wrap", alignItems: "center" }}>
            <div style={{ position: "relative", flex: 1, minWidth: 200 }}>
              <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", color: T.muted, fontSize: 16 }}>🔍</span>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Caută după denumire, EAN, referință sau locație..."
                style={{ width: "100%", height: 44, borderRadius: 11, border: `2px solid ${T.border}`, padding: "0 14px 0 38px", fontSize: 14, background: T.card, color: T.foreground, outline: "none", fontFamily: "'Inter',sans-serif" }}
                onFocus={e => e.target.style.borderColor = T.primary} onBlur={e => e.target.style.borderColor = T.border} />
            </div>
            <Sel value={raionF} onChange={e => setRaionF(e.target.value)} style={{ width: 220 }}>
              <option value="">Toate Raioanele</option>
              {RAIOANE.map(r => <option key={r} value={r}>{r}</option>)}
            </Sel>
            <div style={{ fontSize: 13, color: T.muted }}>{filtered.length} produse</div>
          </Card>

          {filtered.length === 0 ? (
            <Card style={{ padding: "60px 24px", textAlign: "center" }}>
              <div style={{ fontSize: 48, marginBottom: 12 }}>📦</div>
              <div style={{ fontFamily: "'Outfit',sans-serif", fontSize: 18, fontWeight: 700, color: T.foreground }}>Niciun produs găsit</div>
              <div style={{ fontSize: 14, color: T.muted, marginTop: 6 }}>Modifică filtrele sau adaugă un produs nou.</div>
              <div style={{ marginTop: 16 }}><Btn onClick={() => setAddOpen(true)}>Adaugă primul produs</Btn></div>
            </Card>
          ) : (
            <Card className="table-container" style={{ overflow: "hidden" }}>
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse" }}>
                  <thead>
                    <tr>
                      <TH>Referință & EAN / Produs</TH><TH>Raion</TH><TH>Locație</TH><TH align="center">Cantitate</TH><TH>Data Intrare</TH><TH align="center">Acțiuni</TH>
                    </tr>
                  </thead>
                  <tbody>
                    {filtered.map(item => (
                      <tr key={item.id}>
                        <TD>
                          <div style={{ fontWeight: 600 }}>{item.denumire}</div>
                          <div style={{ fontSize: 11, color: T.muted, fontFamily: "monospace" }}>Ref: {item.codSku}{item.ean ? ` • EAN: ${item.ean}` : ""}</div>
                        </TD>
                        <TD><Badge variant="outline">{raionShort(item.raion)}</Badge></TD>
                        <TD style={{ fontWeight: 500 }}>{item.locatie}</TD>
                        <TD align="center"><Badge variant={item.cantitate < 5 ? "destructive" : "success"}>{item.cantitate} buc</Badge></TD>
                        <TD style={{ color: T.muted }}>{fmtDate(item.dataIntrare)}</TD>
                        <TD align="center">
                          <div style={{ display: "flex", gap: 6, justifyContent: "center", alignItems: "center" }}>
                            <button onClick={() => openTx(item, "intrare")} title="Intrare" style={{ padding: "5px 9px", borderRadius: 8, border: "none", background: T.primaryLight, color: T.primaryDark, cursor: "pointer", fontSize: 14, fontWeight: 700 }}>+</button>
                            <button onClick={() => openTx(item, "iesire")} title="Ieșire" style={{ padding: "5px 9px", borderRadius: 8, border: "none", background: T.destructiveLight, color: T.destructive, cursor: "pointer", fontSize: 14, fontWeight: 700 }}>−</button>
                            <button onClick={() => { setDetailItem(item); setTxOpen(false); }} title="Detalii" style={{ padding: "5px 9px", borderRadius: 8, border: "none", background: T.secondary, color: T.muted, cursor: "pointer", fontSize: 13 }}>👁</button>
                            <button onClick={() => setEditItem(item)} title="Editare" style={{ padding: "5px 9px", borderRadius: 8, border: "none", background: T.secondary, color: T.muted, cursor: "pointer", fontSize: 13 }}>✏️</button>
                            <button onClick={() => handleDelete(item.id)} title="Șterge" style={{ padding: "5px 9px", borderRadius: 8, border: "none", background: T.destructiveLight, color: T.destructive, cursor: "pointer", fontSize: 13 }}>🗑</button>
                          </div>
                        </TD>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </Card>
          )}

          <Modal open={addOpen} onClose={() => setAddOpen(false)} title="Adaugă în Suprastoc">

          </Modal>
          <Modal open={!!editItem} onClose={() => setEditItem(null)} title="Editare Produs">
            {editItem && <ItemForm items={items} globalCatalog={globalCatalog} init={editItem} onClose={() => setEditItem(null)} onSave={p => dispatch({ type: "UPDATE_ITEM", payload: { ...p, id: editItem.id } })} />}
          </Modal>
          <Modal open={!!detailItem && !txOpen} onClose={() => setDetailItem(null)} title={detailItem?.denumire || ""} maxWidth={700}>
            {detailItem && <DetailView item={detailItem} tx={tx[detailItem.id] || []} onTx={(tip) => { setTxTip(tip); setTxOpen(true); }} />}
          </Modal>
          <Modal open={txOpen && !!detailItem} onClose={() => { setTxOpen(false); setDetailItem(null); }} title="Înregistrare Tranzacție">
            {detailItem && <TxForm item={detailItem} defaultTip={txTip} onClose={() => { setTxOpen(false); setDetailItem(null); }} onSave={p => dispatch({ type: "ADD_TX", payload: p })} />}
          </Modal>
          <Modal open={quickOutOpen && !quickScanning} onClose={() => { setQuickOutOpen(false); setQuickScanning(false); setQuickOutChoices(null); }} title="Scoatere Rapidă de pe Suprastoc">
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              {quickOutChoices ? (
                <>
                  <div style={{ textAlign: "center", fontSize: 15, color: T.foreground, fontWeight: 600 }}>Acel produs se află în {quickOutChoices.length} locații diferite. Alege locația din care vrei să scoți:</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 8, maxHeight: 300, overflowY: "auto", paddingRight: 4 }}>
                    {quickOutChoices.map(item => (
                      <button key={item.id} onClick={() => {
                        setQuickOutChoices(null);
                        setQuickOutOpen(false);
                        openTx(item, "iesire");
                      }} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 16px", borderRadius: 12, border: `1px solid ${T.border}`, background: T.card, cursor: "pointer", textAlign: "left", transition: "all 0.2s" }} onMouseEnter={e => e.currentTarget.style.borderColor = T.primary} onMouseLeave={e => e.currentTarget.style.borderColor = T.border}>
                        <div style={{ display: "flex", flexDirection: "column" }}>
                          <span style={{ fontSize: 12, color: T.muted, textTransform: "uppercase", fontWeight: 700 }}>Locația</span>
                          <span style={{ fontSize: 16, fontWeight: 800, color: T.primary }}>{item.locatie}</span>
                        </div>
                        <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end" }}>

    function ThreePPage({ raft3p }) {
      const [search, setSearch] = useState("");
      const [raionF, setRaionF] = useState("all");
      const [gamaF, setGamaF] = useState("all");
      const [topF, setTopF] = useState("all");

      const raioni3p = [...new Set(raft3p.map(r => r.raion))].sort();

      const filtered = useMemo(() => raft3p.filter(r => {
        if (raionF !== "all" && r.raion !== Number(raionF)) return false;

        if (topF !== "all" && String(r.top) !== topF) return false;
        const q = search.toLowerCase();
        return !q || (r.denumire || "").toLowerCase().includes(q) || String(r.ref || "").includes(q) || (r.furnizor || "").toLowerCase().includes(q);
      }), [raft3p, raionF, gamaF, topF, search]);

      const raionStats = raioni3p.map(r => ({
        raion: r,
        total: raft3p.filter(p => p.raion === r).length,
        totalSd: raft3p.filter(p => p.raion === r).reduce((s, p) => s + (p.sd || 0), 0),
        cuApro: raft3p.filter(p => p.raion === r && p.apro).length,
        avgSd: raft3p.filter(p => p.raion === r).reduce((s, p) => s + (p.sd || 0), 0) / (raft3p.filter(p => p.raion === r).length || 1),
      }));

                  <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", color: T.muted, fontSize: 16 }}>🔍</span>
                  <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Caută denumire / ref / furnizor..."
                    style={{ width: "100%", height: 44, borderRadius: 11, border: `2px solid ${T.border}`, padding: "0 14px 0 38px", fontSize: 14, background: "#fff", outline: "none", fontFamily: "'Inter',sans-serif" }}
                    onFocus={e => e.target.style.borderColor = T.primary} onBlur={e => e.target.style.borderColor = T.border} />
                </div>
                <Sel value={raionF} onChange={e => setRaionF(e.target.value)} style={{ width: 120 }}><option value="all">Toate R.</option>{raioni3p.map(r => <option key={r} value={r}>Raion {r}</option>)}</Sel>
                <Sel value={gamaF} onChange={e => setGamaF(e.target.value)} style={{ width: 120 }}><option value="all">Toate Gamele</option>{["A", "B", "S"].map(g => <option key={g} value={g}>Gamă {g}</option>)}</Sel>
                <Sel value={topF} onChange={e => setTopF(e.target.value)} style={{ width: 110 }}><option value="all">Toate Top</option>{["0", "1", "2"].map(t => <option key={t} value={t}>Top {t}</option>)}</Sel>
                <div style={{ fontSize: 13, color: T.muted }}>{filtered.length} / {raft3p.length}</div>
              </Card>
              <Card className="table-container" style={{ overflow: "hidden" }}>
                <div style={{ overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse" }}>
                    <thead><tr><TH>Raion</TH><TH>Ref</TH><TH>Denumire</TH><TH>Furnizor</TH><TH align="center">Top</TH><TH align="center">Gamă</TH><TH align="right">Cap. Raft</TH><TH align="right">SD</TH><TH align="center">Aprobare</TH></tr></thead>
                    <tbody>
                      {filtered.map((r, i) => (
                        <tr key={r.id} style={{ background: i % 2 === 0 ? "#fff" : T.bg }}>
                          <TD><span style={{ fontWeight: 700, color: T.primary }}>R{r.raion}</span></TD>
                          <TD style={{ fontFamily: "monospace", fontSize: 12 }}>{r.ref}</TD>

                          <TD style={{ color: T.muted, fontSize: 12 }}>{r.furnizor}</TD>

                          <TD align="center"><Badge variant={`gama_${r.gama}`}>{r.gama}</Badge></TD>
                          <TD align="right" style={{ fontWeight: 500 }}>{fmt(r.capRaft)}</TD>

                      ))}

          {subTab === "raioane" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              <Card style={{ padding: 20 }}>
                <div style={{ fontFamily: "'Outfit',sans-serif", fontSize: 16, fontWeight: 700, color: T.foreground, marginBottom: 16 }}>Stoc Dedicat Total pe Raion</div>
                <ResponsiveContainer width="100%" height={220}>
                  <BarChart data={raionStats.map(r => ({ name: `R${r.raion}`, sd: r.totalSd }))} margin={{ top: 4, right: 8, bottom: 4, left: 0 }}>
                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke={T.border} />
                    <XAxis dataKey="name" tick={{ fontSize: 12, fill: T.muted }} axisLine={false} tickLine={false} />
                    <YAxis tick={{ fontSize: 11, fill: T.muted }} axisLine={false} tickLine={false} />
                    <Tooltip contentStyle={{ borderRadius: 12, border: "none", boxShadow: T.shadowMd, fontSize: 13 }} cursor={{ fill: T.accent }} />
                    <Bar dataKey="sd" name="Total SD" radius={[6, 6, 0, 0]}>{raionStats.map((_, i) => <Cell key={i} fill={T.primary} />)}</Bar>
                  </BarChart>
                </ResponsiveContainer>
              </Card>
              <Card className="table-container" style={{ overflow: "hidden" }}>
                <div style={{ overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse" }}>
                    <thead><tr><TH>Raion</TH><TH align="right">Nr. Produse</TH><TH align="right">Total SD</TH><TH align="right">SD Mediu</TH><TH align="right">Cu Aprobare</TH></tr></thead>
                    <tbody>
                      {raionStats.map((r, i) => (
                        <tr key={r.raion} style={{ background: i % 2 === 0 ? "#fff" : T.bg }}>
                          <TD><span style={{ fontWeight: 700, color: T.primary }}>Raion {r.raion}</span></TD>
                          <TD align="right">{fmt(r.total)}</TD>
                          <TD align="right"><span style={{ fontWeight: 700 }}>{fmt(r.totalSd)}</span></TD>
                          <TD align="right">{fmt(r.avgSd, 1)}</TD>
                          <TD align="right">{r.cuApro > 0 ? <Badge variant="success">{r.cuApro} aprobate</Badge> : <span style={{ color: T.muted }}>—</span>}</TD>

    // ─── APP COMPONENT ────────────────────────────────────────────────────────────
    function App() {
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [page, setPage] = useState("dashboard");
      const [theme, setTheme] = useState(localStorage.getItem('theme') || 'dark');
      const [loading, setLoading] = useState(true);
      const [items, setItems] = useState([]);
      const [globalCatalog, setGlobalCatalog] = useState({});

      useEffect(() => {
        fetch("./catalog.json").then(r => r.json()).then(setGlobalCatalog).catch(e => console.log("Catalogul nu a fost gasit."));
      }, []);

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged(u => {
          setUser(u);
          setAuthLoading(false);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
      }, [theme]);
      const toggleTheme = () => setTheme(t => t === 'light' ? 'dark' : 'light');
      const [tx, setTx] = useState({});
      const [raft3p, setRaft3p] = useState([]);

      useEffect(() => {
        if (!user) return; // Only load data if authenticated
        async function loadData() {
          try {
            const [itemsSnap, txSnap, raftSnap] = await Promise.all([
              db.collection("suprastoc_items").get(),
              db.collection("suprastoc_tx").get(),
              db.collection("raft_3p").get()
            ]);

            const resItems = itemsSnap.docs.map(d => ({ ...d.data(), firebaseId: d.id }));
            const resTx = txSnap.docs.map(d => ({ ...d.data(), firebaseId: d.id }));
            const res3p = raftSnap.docs.map(d => ({ ...d.data(), firebaseId: d.id }));

            setItems(resItems.map(i => ({ ...i, id: Number(i.id), cantitate: Number(i.cantitate) })));

            const txMap = {};
            resTx.forEach(t => {
              const tObj = { ...t, id: Number(t.id), itemId: Number(t.itemId), cantitate: Number(t.cantitate) };
              if (!txMap[tObj.itemId]) txMap[tObj.itemId] = [];
              txMap[tObj.itemId].push(tObj);
            });
            // Sort tx array by dataOra descending
            Object.keys(txMap).forEach(k => txMap[k].sort((a,b) => new Date(b.dataOra) - new Date(a.dataOra)));
            setTx(txMap);

            setRaft3p(res3p.map(r => ({ ...r, id: Number(r.id), raion: Number(r.raion), capRaft: Number(r.capRaft), sd: Number(r.sd) })));
          } catch (e) {
            console.error(e);
            alert("Eroare la conectarea cu Firebase: " + e.message);
          } finally {
            setLoading(false);
          }
        }
        loadData();
      }, [user]);

      const dispatch = async (action) => {
        try {
          if (action.type === "ADD_ITEM") {
            const newItem = { ...action.payload, id: Date.now() };
            setItems(prev => [...prev, newItem]);
            setTx(prev => ({ ...prev, [newItem.id]: [] }));
            // Save to Firebase
            const docRef = db.collection("suprastoc_items").doc(String(newItem.id));
            await docRef.set(newItem);
            // Save doc id inside local state for future updates if necessary
            setItems(prev => prev.map(i => i.id === newItem.id ? { ...i, firebaseId: docRef.id } : i));
          }
          else if (action.type === "UPDATE_ITEM") {
            setItems(prev => prev.map(i => i.id === action.payload.id ? { ...i, ...action.payload } : i));
            
            // Find firebaseId
            const item = items.find(i => i.id === action.payload.id);
            if (item && item.firebaseId) {
               await db.collection("suprastoc_items").doc(item.firebaseId).update(action.payload);
            } else {
               // Fallback: search by id field if firebaseId is missing
               const q = await db.collection("suprastoc_items").where("id", "==", action.payload.id).get();
               if (!q.empty) await q.docs[0].ref.update(action.payload);
            }
          }
          else if (action.type === "DELETE_ITEM") {
            const item = items.find(i => i.id === action.id);
            setItems(prev => prev.filter(i => i.id !== action.id));
            setTx(prev => { const n = { ...prev }; delete n[action.id]; return n; });
            
            if (item && item.firebaseId) {
               await db.collection("suprastoc_items").doc(item.firebaseId).delete();
            } else {
               const q = await db.collection("suprastoc_items").where("id", "==", action.id).get();
               if (!q.empty) await q.docs[0].ref.delete();
            }
          }
          else if (action.type === "ADD_TX") {
            const { itemId, tip, cantitate, utilizator, motiv } = action.payload;
            const currentUser = auth.currentUser;
            const currentUserName = currentUser ? currentUser.displayName : "Necunoscut";
            const newTx = { id: Date.now(), itemId, tip, cantitate, utilizator: currentUserName, motiv, dataOra: new Date().toISOString() };

            setTx(prev => ({ ...prev, [itemId]: [newTx, ...(prev[itemId] || [])] }));

            let newQty = 0;
            let itemFirebaseId = null;
            setItems(prev => prev.map(i => {
              if (i.id === itemId) {
                newQty = tip === "intrare" ? i.cantitate + cantitate : i.cantitate - cantitate;
                itemFirebaseId = i.firebaseId;
                return { ...i, cantitate: newQty };
              }
              return i;
            }));

            const txRef = db.collection("suprastoc_tx").doc(String(newTx.id));
            await txRef.set(newTx);
            
            if (itemFirebaseId) {
               await db.collection("suprastoc_items").doc(itemFirebaseId).update({ cantitate: newQty });
            } else {
               const q = await db.collection("suprastoc_items").where("id", "==", itemId).get();
               if (!q.empty) await q.docs[0].ref.update({ cantitate: newQty });
            }
          }
        } catch (err) {
          console.error(err);
          alert("Eroare la salvarea în Firebase: " + err.message);
        }
      };

      if (authLoading) return <div style={{ display: "flex", height: "100vh", alignItems: "center", justifyContent: "center" }}><FontLoader /><div style={{ fontSize: 40, animation: "spin 1s linear infinite" }}>⏳</div></div>;
      
      if (!user) return <LoginScreen />;

      if (loading) {
        return (
          <div style={{ display: "flex", height: "100vh", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16 }}>
            <FontLoader />
            <div style={{ fontSize: 40, animation: "spin 1s linear infinite" }}>⏳</div>
            <div style={{ fontFamily: "'Outfit',sans-serif", fontSize: 20, fontWeight: 700 }}>Se sincronizează cu Firebase...</div>
          </div>
        );
      }

      return (
        <>
          <FontLoader />
          <div style={{ display: "flex", minHeight: "100vh", background: T.bg, color: T.foreground }}>
            <div className="pc-only" style={{ display: "flex" }}>
              <Sidebar page={page} setPage={setPage} theme={theme} toggleTheme={toggleTheme} user={user} onLogout={() => auth.signOut()} />
            </div>
            <div className="mobile-only" style={{ position: "fixed", bottom: 0, left: 0, right: 0, height: 72, background: T.card, borderTop: `1px solid ${T.border}`, justifyContent: "space-around", alignItems: "center", zIndex: 100, boxShadow: "0 -4px 20px rgba(0,0,0,0.06)", paddingBottom: "env(safe-area-inset-bottom)" }}>
              {NAV.map(n => {
                const active = page === n.id;
                return (
                  <button key={n.id} onClick={() => setPage(n.id)} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6, background: "transparent", border: "none", color: active ? T.primary : T.muted, cursor: "pointer", flex: 1, height: "100%", justifyContent: "center" }}>
                    <span style={{ fontSize: 24, filter: active ? "" : "grayscale(100%)", opacity: active ? 1 : 0.6 }}>{n.icon}</span>
                    <span style={{ fontSize: 11, fontWeight: active ? 700 : 500, fontFamily: "'Inter',sans-serif" }}>{n.label}</span>
                  </button>
                )
              })}
              <button onClick={toggleTheme} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6, background: "transparent", border: "none", color: T.muted, cursor: "pointer", flex: 1, height: "100%", justifyContent: "center" }}>
                <span style={{ fontSize: 24, opacity: 0.8 }}>{theme === 'dark' ? '☀️' : '🌙'}</span>
                <span style={{ fontSize: 11, fontWeight: 500, fontFamily: "'Inter',sans-serif" }}>Temă</span>
              </button>
            </div>
            <main className="main-content" style={{ flex: 1, overflowY: "auto", minHeight: "100vh" }}>
              <div style={{ maxWidth: 1100, margin: "0 auto" }}>
                {page === "dashboard" && <DashboardPage items={items} raft3p={raft3p} />}
                {page === "suprastoc" && <SuprastocPage items={items} tx={tx} dispatch={dispatch} globalCatalog={globalCatalog} />}
                {page === "3p" && <ThreePPage raft3p={raft3p} />}
              </div>
            </main>
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>

</html>
